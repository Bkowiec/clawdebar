<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="16" fill="url(#bg)"/>

  <!--
    Clawde — pixel grid (u=8), matching drawClaudeIcon exactly:
      ears:  (1u,1u) 2u×2u  and  (9u,1u) 2u×2u
      body:  (2u,2u) 8u×7u
      feet:  (2u,9u) 2u×3u  and  (8u,9u) 2u×3u
    Overlapping rects so it's one seamless shape.
  -->
  <g transform="translate(32, 16)" fill="#cc7340">
    <!-- Left ear -->
    <rect x="8" y="8" width="16" height="16"/>
    <!-- Right ear -->
    <rect x="72" y="8" width="16" height="16"/>
    <!-- Body -->
    <rect x="16" y="16" width="64" height="56"/>
    <!-- Left leg -->
    <rect x="16" y="64" width="16" height="32"/>
    <!-- Right leg -->
    <rect x="64" y="64" width="16" height="32"/>
  </g>

  <!-- Eyes -->
  <g transform="translate(32, 16)">
    <!-- Left eye (chevron >) -->
    <polyline points="32,36 40,44 32,52" fill="none" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right eye (chevron <) -->
    <polyline points="64,36 56,44 64,52" fill="none" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="168" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">Clawdebar</text>
  <text x="168" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8892a4">Menu bar companion for Claude Code</text>

  <!-- Three state dots -->
  <g transform="translate(168, 124)">
    <circle cx="6" cy="6" r="5" fill="#cc7340" opacity="0.9"/>
    <text x="18" y="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8892a4">Working</text>
    <circle cx="86" cy="6" r="5" fill="#e6b333" opacity="0.9"/>
    <text x="98" y="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8892a4">Waiting</text>
    <circle cx="166" cy="6" r="5" fill="#6b7280" opacity="0.9"/>
    <text x="178" y="11" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8892a4">Idle</text>
  </g>
</svg>
